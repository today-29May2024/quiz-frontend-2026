<div>
  <h3 style="color: #d9534f; margin-top: 0;">Admin Dashboard</h3>
  
  <fieldset style="border: 1px solid #ddd; border-radius: 6px; padding: 15px; margin-bottom: 25px; background: #fafafa;">
    <legend style="font-weight: bold; padding: 0 5px;">Add New Question</legend>
    
    <div style="margin-bottom: 12px;">
      <label style="display: block; font-weight: bold; margin-bottom: 4px;">Question Title:</label>
      <input type="text" [(ngModel)]="newTitle" placeholder="e.g., What is capital of Japan?" style="width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
    </div>

    <div style="margin-bottom: 12px;">
      <label style="display: block; font-weight: bold; margin-bottom: 4px;">Answer Options:</label>
      @for (opt of newOptions; track opt) {
        <input type="text" name="option-{{$index}}" [(ngModel)]="opt.value" placeholder="Option {{ $index + 1 }}" style="width: 95%; padding: 6px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 4px; display: block;">
      }
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; font-weight: bold; margin-bottom: 4px;">Correct Option Index (0-3):</label>
      <select [(ngModel)]="newCorrectIndex" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
        <option [value]="0">Option 1</option>
        <option [value]="1">Option 2</option>
        <option [value]="2">Option 3</option>
        <option [value]="3">Option 4</option>
      </select>
    </div>

    <button (click)="addQuestion()" style="background-color: #28a745; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1rem;">
      Save Question to Database
    </button>
  </fieldset>

  <h4 style="margin-bottom: 10px; color: #555;">Existing Questions ({{ questions.length }})</h4>
  <div style="max-height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 4px;">
    @for (q of questions; track q.id) {
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: #fff;">
        <span style="font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%;">
          {{ $index + 1 }}. {{ q.title }}
        </span>
        <button (click)="deleteQuestion(q.id)" style="background-color: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">
          Delete
        </button>
      </div>
    }
  </div>
</div>
